# 股別介紹
departments_title: "活動介紹"
departments:
  - name: "吉伴股"
    desc: "我們負責練團、表演、吃宵夜。我們需要男女主唱、木吉他、電吉他、貝斯、木箱鼓、KB。歡迎喜歡舞台、熱愛表演、想發揮無處安放的音樂才華、愛吃宵夜、愛聊天的你。"
    extra_info:
      - "股聚時間 (寒假)：先找一些想開的歌"
      - "股聚時間 (開學後)：每周1次"
  - name: "女舞股"
    desc: "我們負責舞室編舞 + 一些kpop + 你想跳的，不管對kpop或跳舞有興趣的，我們都歡迎！但需要有自己扒舞的能力!"
    extra_info:
      - "股聚時間 (寒假)：自主練習"
      - "股聚時間 (開學後)：每周1-2次，每次2小時"
  - name: "男舞股"
    desc: "男舞以locking這個舞風為主軸，加上各式的隊形及分布，呈現出多采多姿的表演。只要對跳舞有興趣，不管跳過舞或零基礎想嘗試跳舞都歡迎加入！"
    extra_info:
      - "股聚時間 (寒假)：自主練習"
      - "股聚時間 (開學後)：每周1-2次，每次1-2小時"
  - name: "魔術股"
    desc: "我們負責練習魔術，學會表演，上台表演。我們需要喜歡魔術，熱愛表演，並且願意練習的你。"
    extra_info:
      - "股聚時間 (寒假)：自主練習 (每兩周拍影片驗收)"
      - "股聚時間 (開學後)：每周1-2次，每次2小時"
  - name: "螢光舞股"
    desc: "我們負責配合音樂的節奏、氛圍，設計燈效，編排舞步，想辦法讓板子動，然後發光和跳舞！我們需要喜歡跳舞，有酷點子，想搞工程的你。"
    extra_info:
      - "股聚時間 (寒假)：決定曲目、開始構想以及練舞"
      - "股聚時間 (開學後)：每周2次，每次1-2小時"
  - name: "喜劇股"
    desc: "我們負責演好笑的戲，滑抖音找靈感，開一大堆不用負責的玩笑，在教授臉上給出對於課程的反饋。加入喜劇股你需要：放開來演戲、跟得上時事梗、天馬行空的想像力。"
    extra_info:
      - "股聚時間：每週2次，每次2小時"
  - name: "美宣股"
    desc: "我們負責做海報、做道具、設計小物和P圖。我們需要不想上台、不用有特殊專長的你！"
    extra_info:
      - "股聚時間：每週1-2次，7:00pm ~ 9:00pm"
      - "做不完不用帶回宿舍做！"

