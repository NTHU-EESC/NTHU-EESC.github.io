# 基礎資訊
year: 2025
activity_name: "清大電機之夜"
intro_text: >
  嗨大家！大一過到現在有沒有覺得天天讀書的日子枯燥乏味了？想展現你那無處安放的才華嗎？想要在台上讓底下的觀眾為你放聲尖叫嗎？眾所矚目的電機之夜明年5月要登場啦！不管是有經驗沒經驗都可以上台秀喔！綻放屬於你自己的光芒！那就讓我們一起在這個電機系的夜晚大膽帥一波吧！

