# 基礎資訊
year: 0000
activity_name: "清大電機新創營"
intro_text: >
  相信許多朋朋去年八月都在新創營玩得很開心！為了將這份特別的體驗延續給下一屆的學弟妹們，我們即將迎來新創營的籌備啦！不管是有當過小隊員的舊朋友，還是想來玩玩營隊的新朋友們，只要抱著一顆愉快的心，都非常歡迎你們的參加！

