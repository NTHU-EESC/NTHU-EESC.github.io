# 活動介紹 (組別)
departments_title: "活動介紹"
departments:
  - name: "電路設計組"
    desc: "學習設計和製作各種有趣的電路，從簡單的 LED 閃爍器到複雜的音頻放大器，讓你的創意在電路板上綻放光芒。"
  - name: "程式設計組"
    desc: "深入探索 Python 和 C++ 等程式語言，學習如何控制硬體設備，開發智能系統，讓你的程式直接與現實世界互動。"
  - name: "人工智慧組"
    desc: "了解 AI 的基本原理，實際操作機器學習模型，參與激動人心的專案，如圖像識別或自然語言處理。"
  - name: "物聯網組"
    desc: "探索 IoT 的無限可能，學習如何連接和控制各種智能設備，打造屬於自己的智能家居或環境監測系統。"
  # 你可以隨意增加/減少
  # - name: "組別名稱"
  #   desc: "組別說明"

