# 基礎資訊
year: 0000
activity_name: "清大電機營"
intro_text: >
  加入我們的 0000 清大電機營，探索電機工程的奧秘！這是一個為期一週的精彩活動，讓你親身體驗最新的電機技術，結識志同道合的朋友，並在專業導師的指導下完成令人驚嘆的項目。無論你是電機新手還是有經驗的愛愛好者，這裡都有適合你的精彩內容！

# 籌備時程規劃
timeline_title: "籌備時程規劃"
